<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connection Review Board</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin:0; background:#f7f8fa; color:#1a1d21; font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:920px; margin:0 auto; padding:16px 16px 80px; }
  header.top { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  h1 { font-size:18px; margin:0; }
  .sub { color:#5b636e; font-size:12px; }
  .counts { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0 4px; }
  .count-pill { background:#eef0f3; border-radius:999px; padding:3px 10px; font-size:12px; color:#3a4048; }
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:12px 0 16px; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { border:1px solid #d4d8dd; background:#fff; border-radius:999px; padding:4px 12px; font-size:12px; cursor:pointer; color:#3a4048; }
  .chip.active { background:#1a1d21; color:#fff; border-color:#1a1d21; }
  select { padding:5px 8px; border:1px solid #d4d8dd; border-radius:8px; background:#fff; font:inherit; }
  .grid { display:grid; gap:12px; }
  .card { background:#fff; border:1px solid #e4e7eb; border-radius:12px; padding:14px 16px; }
  .card-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .name { font-weight:650; font-size:15px; }
  .role { color:#3a4048; font-size:13px; margin-top:1px; }
  .badge { font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; padding:2px 8px; border-radius:6px; white-space:nowrap; }
  .b-hiring_manager { background:#e7f0ff; color:#1c4fb3; } .b-recruiter { background:#eafaf0; color:#1c7d4d; }
  .b-peer { background:#fff3e0; color:#9a5b00; } .b-alumni { background:#f3e9ff; color:#6b34b3; } .b-other { background:#eef0f3; color:#3a4048; }
  .why { color:#5b636e; font-size:12.5px; margin:8px 0 10px; }
  .msg { background:#f4f5f7; border:1px solid #e4e7eb; border-radius:8px; padding:10px 12px; font-size:13px; white-space:pre-wrap; }
  .msg-meta { display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
  .chars { font-size:11px; color:#8a9097; } .chars.over { color:#c0392b; font-weight:600; }
  .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  button.act { border:1px solid #d4d8dd; background:#fff; border-radius:8px; padding:6px 12px; font-size:12.5px; cursor:pointer; color:#1a1d21; }
  button.act:hover { background:#f0f1f3; }
  button.primary { background:#1a1d21; color:#fff; border-color:#1a1d21; } button.primary:hover { background:#33373d; }
  button.sel { outline:2px solid #1a1d21; }
  a.profile { text-decoration:none; }
  .status-tag { font-size:11px; padding:2px 8px; border-radius:6px; }
  .s-new { background:#e7f0ff; color:#1c4fb3; } .s-reviewed { background:#fff3e0; color:#9a5b00; }
  .s-sent { background:#eafaf0; color:#1c7d4d; } .s-skipped { background:#f0f1f3; color:#8a9097; }
  .empty { text-align:center; color:#5b636e; padding:40px 16px; }
  .dim { opacity:.55; }
  .savebar { position:fixed; left:0; right:0; bottom:0; background:#1a1d21; color:#fff; padding:10px 16px; display:none; align-items:center; justify-content:space-between; gap:12px; }
  .savebar.show { display:flex; }
  .savebar button { background:#fff; color:#1a1d21; border:none; border-radius:8px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; }
  .savebar .hint { font-size:12px; color:#c7ccd2; }
  .toast { position:fixed; bottom:60px; left:50%; transform:translateX(-50%); background:#1a1d21; color:#fff; padding:8px 14px; border-radius:8px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; }
  .toast.show { opacity:1; }
  .pathbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:#eef0f3; border-radius:8px; padding:6px 10px; margin:10px 0 0; font-size:11.5px; color:#5b636e; }
  .pathbar code { background:#fff; border:1px solid #e4e7eb; border-radius:5px; padding:2px 6px; font:11px ui-monospace,Consolas,monospace; color:#3a4048; word-break:break-all; }
  button.toolbtn { border:1px solid #d4d8dd; background:#fff; border-radius:999px; padding:4px 12px; font-size:12px; cursor:pointer; color:#3a4048; }
  button.toolbtn:hover { background:#f0f1f3; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Connection Review Board</h1>
      <div class="sub">Career Booster · review here, send on LinkedIn yourself</div>
    </div>
  </header>
  <div class="pathbar" id="queuePath"></div>
  <div class="counts" id="counts"></div>
  <div class="toolbar">
    <div class="chips" id="statusChips"></div>
    <select id="companyFilter"><option value="">All companies</option></select>
    <select id="sortBy">
      <option value="dateFound-desc">Newest first</option>
      <option value="dateFound-asc">Oldest first</option>
      <option value="company-asc">Company A–Z</option>
      <option value="contactName-asc">Name A–Z</option>
    </select>
    <button class="toolbtn" id="downloadCsv" title="Download the full queue as a CSV (opens in Excel)">⬇ CSV</button>
    <button class="toolbtn" id="uploadDrive" title="Upload the queue as a CSV to Google Drive (becomes a Google Sheet)" style="display:none;">☁ Drive</button>
  </div>
  <div class="grid" id="grid"></div>
</div>
<div class="savebar" id="savebar">
  <div style="flex:1; min-width:0;">
    <div><b id="pendCount">0</b> unsaved change(s) — copy this line and paste into chat so Claude saves them:</div>
    <input id="cmdBox" readonly onclick="this.select()" style="width:100%; margin-top:6px; padding:6px 8px; border-radius:6px; border:none; font:12px ui-monospace,Consolas,monospace;">
  </div>
  <button id="copyUpdates">Copy</button>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Connection Review Board — EMBED + PASTE design.

   The Cowork artifact sandbox can only call HOSTED MCP connectors via
   callMcpTool (local connectors like Desktop Commander return 400), and
   exposes NO function to send a message back to chat. So:
     • READ  — the connection-dashboard skill reads connections-queue.json
               agent-side and bakes the connections array in below at build
               time (replaces __CONNECTIONS_JSON__). No file call from here.
     • WRITE — status changes can't be written from the sandbox. They are
               staged in localStorage and exported as a one-line command the
               user pastes into chat; the skill then writes them to the queue.

   The skill substitutes:
     __QUEUE_PATH__       → absolute connectionQueuePath from the profile
     __CONNECTIONS_JSON__ → JSON array of the queue's `connections`
     __DRIVE_TOOL__       → fully-qualified Drive create_file tool name, or "" if no Drive connector
   ============================================================ */
const QUEUE_DATA = {
  "queuePath": "__QUEUE_PATH__",
  "driveTool": "mcp__205b77f2-291a-4d3d-b633-ed56405ca47b__create_file",
  "driveFolderId": "1XKFAeqckIj7dBkLu4npDa4ACk0wZfUg4",
  "connections": __CONNECTIONS_JSON__
};

const STATUSES = ["new","reviewed","sent","skipped"];
const LS_VIEW = "cb_view", LS_PEND = "cb_pending_" + QUEUE_DATA.queuePath;
let view = load(LS_VIEW, { status:"all", company:"", sort:"dateFound-desc" });
let pending = load(LS_PEND, {});   // { id: status }

function load(k, d){ try { return Object.assign({}, d, JSON.parse(localStorage.getItem(k) || "{}")); } catch { return d; } }
function save(k, v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
function esc(s){ return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); }

// effective status = embedded status unless a pending change overrides it
function statusOf(c){ return pending[c.id] || c.status || "new"; }

function setStatus(id, s){
  const base = QUEUE_DATA.connections.find(c=>c.id===id);
  if (base && (base.status||"new") === s) delete pending[id];   // back to original → not pending
  else pending[id] = s;
  save(LS_PEND, pending);
  render();
}

function pendingCmd(){
  const parts = Object.entries(pending).map(([id,s]) => `${id}=${s}`);
  return parts.length ? "Apply status changes to my connection queue: " + parts.join(", ") : "";
}
// Robust copy: hidden-textarea execCommand first (works in the sandbox), then clipboard API, else ask to copy manually.
function robustCopy(text, okMsg){
  let done = false;
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    done = !!(document.execCommand && document.execCommand("copy"));
    document.body.removeChild(ta);
  } catch (_) {}
  if (done) { toast(okMsg || "Copied"); return; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(()=>toast(okMsg || "Copied")).catch(()=>toast("Select the text and press Ctrl+C"));
  } else { toast("Select the text and press Ctrl+C"); }
}
function copyUpdates(){
  const cmd = pendingCmd();
  if (!cmd) return;
  const box = document.getElementById("cmdBox"); if (box){ box.focus(); box.select(); }
  robustCopy(cmd, "Copied — paste into chat to save");
}

function visible(){
  let list = QUEUE_DATA.connections.slice();
  if (view.status !== "all") list = list.filter(c => statusOf(c) === view.status);
  if (view.company) list = list.filter(c => c.company === view.company);
  const [key] = view.sort.split("-");
  list.sort((a,b)=>{ const av=(a[key]||"").toLowerCase?(a[key]||"").toString().toLowerCase():a[key], bv=(b[key]||"").toString().toLowerCase(); return av<bv?-1:av>bv?1:0; });
  if (view.sort.endsWith("-desc")) list.reverse();
  return list;
}

function render(){
  const all = QUEUE_DATA.connections;
  const by = s => all.filter(c => statusOf(c) === s).length;
  document.getElementById("counts").innerHTML =
    `<span class="count-pill">Total ${all.length}</span>` + STATUSES.map(s=>`<span class="count-pill">${s} ${by(s)}</span>`).join("");

  document.getElementById("statusChips").innerHTML = ["all",...STATUSES].map(s=>
    `<span class="chip ${view.status===s?"active":""}" data-status="${s}">${s}</span>`).join("");

  const sel = document.getElementById("companyFilter");
  const companies = [...new Set(all.map(c=>c.company).filter(Boolean))].sort();
  sel.innerHTML = `<option value="">All companies</option>` + companies.map(c=>`<option value="${esc(c)}" ${view.company===c?"selected":""}>${esc(c)}</option>`).join("");
  document.getElementById("sortBy").value = view.sort;

  const list = visible(), grid = document.getElementById("grid");
  grid.innerHTML = list.length ? list.map(c=>{
    const st = statusOf(c), type = c.type||"other", chars = c.messageChars ?? (c.message?c.message.length:0), over = chars>300;
    const btn = (s,label)=>`<button class="act ${st===s?"sel":""}" data-set="${s}" data-id="${esc(c.id)}">${label}</button>`;
    return `<div class="card ${st==="skipped"?"dim":""}">
      <div class="card-head">
        <div><div class="name">${esc(c.contactName)} <span class="status-tag s-${st}">${st}</span></div>
        <div class="role">${esc(c.contactTitle)}${c.company?" · "+esc(c.company):""}</div></div>
        <span class="badge b-${type}">${esc(type.replace("_"," "))}</span>
      </div>
      ${c.whyRelevant?`<div class="why">${esc(c.whyRelevant)}</div>`:""}
      <div class="msg">${esc(c.message||"(no message)")}
        <div class="msg-meta"><span class="chars ${over?"over":""}">${chars}/300</span>
        <button class="act" data-copy="${esc(c.id)}">Copy note</button></div></div>
      <div class="actions">
        ${c.linkedinUrl?`<a class="profile" href="${esc(c.linkedinUrl)}" target="_blank" rel="noopener"><button class="act primary">Open profile</button></a>`:""}
        ${btn("reviewed","Reviewed")} ${btn("sent","Sent")} ${btn("skipped","Skip")}
      </div></div>`;
  }).join("") : `<div class="empty">No connections match this view.</div>`;

  grid.querySelectorAll("[data-copy]").forEach(b=>{ const r=list.find(x=>x.id===b.getAttribute("data-copy")); b.onclick=()=>{ robustCopy(r.message||"", "Note copied"); const o=b.textContent; b.textContent="Copied"; setTimeout(()=>b.textContent=o,1200); }; });
  grid.querySelectorAll("[data-set]").forEach(b=>{ b.onclick=()=>setStatus(b.getAttribute("data-id"), b.getAttribute("data-set")); });

  const n = Object.keys(pending).length;
  document.getElementById("pendCount").textContent = n;
  document.getElementById("savebar").classList.toggle("show", n>0);
  const box = document.getElementById("cmdBox"); if (box && n>0) box.value = pendingCmd();
}

document.getElementById("statusChips").addEventListener("click", e=>{ const s=e.target.getAttribute("data-status"); if(!s) return; view.status=s; save(LS_VIEW,view); render(); });
document.getElementById("companyFilter").addEventListener("change", e=>{ view.company=e.target.value; save(LS_VIEW,view); render(); });
document.getElementById("sortBy").addEventListener("change", e=>{ view.sort=e.target.value; save(LS_VIEW,view); render(); });
document.getElementById("copyUpdates").addEventListener("click", copyUpdates);

// Queue file path display (informational — the board never reads/writes it; the skill does)
(function(){ const el=document.getElementById("queuePath"); if(el) el.innerHTML = 'Queue file: <code>'+esc(QUEUE_DATA.queuePath)+'</code>'; })();

// CSV export — fully portable, uses no connector. Builds from the embedded snapshot.
const CSV_COLS = ["id","contactName","contactTitle","company","type","status","linkedinUrl","whyRelevant","message","messageChars","dateFound","dateSent","source","titleVerified"];
function csvCell(v){ if(v==null) return ""; const s=String(v); return /[",\n\r]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
function buildCsv(){ const rows=QUEUE_DATA.connections.map(c=>CSV_COLS.map(k=>csvCell(c[k])).join(",")); return "﻿"+[CSV_COLS.join(",")].concat(rows).join("\r\n"); }
function csvName(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return "connections-"+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+"-"+p(d.getHours())+p(d.getMinutes())+".csv"; }
document.getElementById("downloadCsv").addEventListener("click", ()=>{
  if(!QUEUE_DATA.connections.length){ toast("Queue is empty — nothing to export"); return; }
  const blob=new Blob([buildCsv()],{type:"text/csv;charset=utf-8"}), url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=csvName(); document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500); toast("CSV downloaded");
});

// Drive upload — only when the skill resolved a Drive connector tool at build time.
// callMcpTool works for HOSTED connectors (Google Drive is hosted); local connectors return 400.
(function(){
  const tool = QUEUE_DATA.driveTool;
  const btn = document.getElementById("uploadDrive");
  if(!btn || !tool || tool.indexOf("__") === 0) return;      // placeholder unresolved → stay hidden
  btn.style.display = "";
  btn.addEventListener("click", async ()=>{
    if(!QUEUE_DATA.connections.length){ toast("Queue is empty — nothing to upload"); return; }
    if(!(window.cowork && window.cowork.callMcpTool)){ toast("Drive upload only works inside Cowork"); return; }
    btn.disabled = true; const orig = btn.textContent; btn.textContent = "Uploading…";
    try {
      const _args = {
        title: csvName().replace(/\.csv$/, ""),   // Drive converts CSV → Google Sheet
        textContent: buildCsv(),
        contentMimeType: "text/csv"
      };
      if (QUEUE_DATA.driveFolderId && QUEUE_DATA.driveFolderId.indexOf("__") !== 0) _args.parentId = QUEUE_DATA.driveFolderId;
      const r = await window.cowork.callMcpTool(tool, _args);
      const data = r && (r.structuredContent ?? (r.content && r.content[0] && JSON.parse(r.content[0].text)));
      if(r && r.isError){ throw new Error((r.content && r.content[0] && r.content[0].text) || "upload failed"); }
      toast("Uploaded to Drive" + (data && (data.title||data.name) ? ' as "'+(data.title||data.name)+'"' : "") + " — set sharing in Drive");
    } catch(e){
      toast("Drive upload failed: " + (e && e.message ? e.message : e));
    } finally { btn.disabled = false; btn.textContent = orig; }
  });
})();

render();
</script>
</body>
</html>
